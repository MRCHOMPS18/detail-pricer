<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Detail Pricer">
<title>Detail Pricer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --bg4: #2e2e2e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #666;
  --accent: #4ade80;
  --accent-dim: rgba(74,222,128,0.12);
  --accent-border: rgba(74,222,128,0.3);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; overflow: hidden; }

/* App shell */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg3); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s; flex-shrink: 0; }
.icon-btn:active { background: var(--bg4); }
.icon-btn svg { width: 18px; height: 18px; stroke: var(--text2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* Tab bar */
.tabbar { display: flex; padding: 10px 20px; gap: 8px; flex-shrink: 0; }
.tab { flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; text-align: center; }
.tab.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

/* Scroll content */
.content { flex: 1; overflow-y: auto; padding: 4px 20px 40px; -webkit-overflow-scrolling: touch; }
.page { display: none; }
.page.active { display: block; }

/* Section */
.section { margin-bottom: 20px; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; font-family: 'DM Mono', monospace; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border2); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); background: var(--bg2); transition: all .15s; }
.chip:active { opacity: .7; }
.chip.active { border-color: var(--accent-border); background: var(--accent-dim); color: var(--accent); }

/* Checklist grid */
.checks { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.check { display: flex; align-items: center; gap: 9px; padding: 10px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg2); cursor: pointer; font-size: 13px; color: var(--text2); transition: all .15s; user-select: none; line-height: 1.3; }
.check:active { opacity: .7; }
.check.on { border-color: rgba(248,113,113,0.35); background: rgba(248,113,113,0.08); color: var(--red); }
.dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; transition: all .15s; }
.check.on .dot { background: var(--red); border-color: var(--red); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* Result */
.result-wrap { margin-top: 4px; }
.result-empty { text-align: center; padding: 24px 0; color: var(--text3); font-size: 14px; }
.result-card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.result-top { padding: 16px 18px 14px; border-bottom: 1px solid var(--border); }
.level-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
.result-price { font-size: 42px; font-weight: 600; letter-spacing: -1.5px; line-height: 1; }
.result-meta { font-size: 12px; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; }
.result-bottom { display: grid; grid-template-columns: 1fr 1fr; }
.stat { padding: 14px 18px; }
.stat:first-child { border-right: 1px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.stat-val { font-size: 18px; font-weight: 600; }

/* Reset */
.reset-btn { width: 100%; margin-top: 14px; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all .15s; }
.reset-btn:active { background: var(--bg3); color: var(--text2); }

/* ── Settings ── */
.settings-section { margin-bottom: 24px; }
.settings-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
.settings-grid { display: grid; gap: 8px; }
.settings-row { background: var(--bg2); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px 14px; }
.settings-row-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.price-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.price-input-wrap { display: flex; flex-direction: column; gap: 4px; }
.price-input-lbl { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.price-input { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; -webkit-appearance: none; }
.price-input:focus { outline: none; border-color: rgba(74,222,128,0.4); }
.size-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.check-editor { display: grid; gap: 6px; }
.check-edit-row { display: flex; align-items: center; gap: 8px; }
.check-edit-input { flex: 1; padding: 8px 11px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; }
.check-edit-input:focus { outline: none; border-color: rgba(74,222,128,0.4); }
.pts-select { padding: 8px 8px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; width: 52px; -webkit-appearance: none; text-align: center; }
.pts-select:focus { outline: none; }
.del-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.del-btn:active { background: rgba(248,113,113,0.15); color: var(--red); border-color: rgba(248,113,113,0.3); }
.add-btn { width: 100%; padding: 9px; border-radius: 6px; border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all .15s; margin-top: 4px; }
.add-btn:active { background: var(--bg3); color: var(--text2); }

.save-btn { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #0a1a0f; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
.save-btn:active { opacity: .8; }
.save-toast { text-align: center; font-size: 13px; color: var(--accent); font-family: 'DM Mono', monospace; margin-top: 10px; opacity: 0; transition: opacity .3s; height: 20px; }
.save-toast.show { opacity: 1; }

/* Size name inputs row */
.size-name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.size-name-wrap { display: flex; flex-direction: column; gap: 4px; }
.size-name-lbl { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.size-name-input { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; }
.size-name-input:focus { outline: none; border-color: rgba(74,222,128,0.4); }

.lvl-colors { --l1: var(--accent); --l2: var(--blue); --l3: var(--amber); --l4: var(--red); }
</style>
</head>
<body>
<div id="app" class="lvl-colors">
  <div class="header">
    <div>
      <div class="header-title">Detail Pricer</div>
      <div class="header-sub">mobile detailing estimator</div>
    </div>
    <div class="icon-btn" onclick="switchPage('settings')" id="settings-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>

  <div class="content">

    <!-- ESTIMATOR PAGE -->
    <div class="page active" id="page-estimate">
      <div style="height:16px"></div>

      <div class="section">
        <div class="section-label">Vehicle size</div>
        <div class="chips" id="size-chips"></div>
      </div>

      <div class="section">
        <div class="section-label">Service type</div>
        <div class="chips" id="svc-chips">
          <div class="chip" data-val="ext">Exterior only</div>
          <div class="chip" data-val="int">Interior only</div>
          <div class="chip" data-val="both">Exterior + interior</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-label">Interior condition</div>
        <div class="checks" id="int-checks"></div>
      </div>

      <div class="section">
        <div class="section-label">Exterior condition</div>
        <div class="checks" id="ext-checks"></div>
      </div>

      <div class="result-wrap" id="result-wrap"></div>
      <button class="reset-btn" onclick="resetAll()">Clear all selections</button>
      <div style="height:20px"></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="page" id="page-settings">
      <div style="height:16px"></div>

      <div class="settings-section">
        <div class="settings-title">Vehicle size names</div>
        <div class="settings-row">
          <div class="size-name-grid" id="size-name-inputs"></div>
        </div>
      </div>

      <div class="settings-section" id="price-settings"></div>

      <div class="settings-section">
        <div class="settings-title">Interior checklist items</div>
        <div class="settings-row">
          <div class="check-editor" id="int-editor"></div>
          <button class="add-btn" onclick="addCheck('int')">+ add item</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-title">Exterior checklist items</div>
        <div class="settings-row">
          <div class="check-editor" id="ext-editor"></div>
          <button class="add-btn" onclick="addCheck('ext')">+ add item</button>
        </div>
      </div>

      <button class="save-btn" onclick="saveSettings()">Save changes</button>
      <div class="save-toast" id="toast">Changes saved</div>
      <div style="height:30px"></div>
    </div>

  </div>
</div>

<script>
// ── Default data ──
const DEFAULT = {
  sizeNames: ['Compact / sedan', 'Mid-size SUV', 'Full-size SUV / truck', 'XL / van / dually'],
  prices: {
    ext:  [[120,130,140,150],[140,150,160,170],[155,165,175,185],[175,185,195,205]],
    int:  [[170,180,190,200],[200,210,220,230],[230,240,250,260],[270,280,290,300]],
    both: [[250,260,270,280],[285,295,305,315],[320,330,340,350],[380,390,400,410]]
  },
  intChecks: [
    {label:'Dust / debris', pts:1}, {label:'Dirt / mud', pts:1},
    {label:'Seat stains', pts:2}, {label:'Sticky grime', pts:2},
    {label:'Pet hair', pts:2}, {label:'Food / drink spills', pts:2},
    {label:'Heavy soiling', pts:3}, {label:'Odor / smoke', pts:3}
  ],
  extChecks: [
    {label:'Light dust / pollen', pts:1}, {label:'Dirt / road grime', pts:1},
    {label:'Bug splatter', pts:2}, {label:'Water spots', pts:2},
    {label:'Tree sap / tar', pts:2}, {label:'Heavy oxidation', pts:3},
    {label:'Paint overspray', pts:3}, {label:'Swirl marks', pts:3}
  ]
};

// ── State ──
let S = JSON.parse(localStorage.getItem('dp_state') || 'null') || JSON.parse(JSON.stringify(DEFAULT));
let sel = { size: null, svc: null };
let checkedInt = {}, checkedExt = {};

const LEVEL_META = [
  { color: 'var(--accent)', dim: 'var(--accent-dim)', label: 'Level 1', desc: 'clean / light work' },
  { color: 'var(--blue)',   dim: 'var(--blue-dim)',   label: 'Level 2', desc: 'moderate condition' },
  { color: 'var(--amber)',  dim: 'var(--amber-dim)',  label: 'Level 3', desc: 'heavy condition' },
  { color: 'var(--red)',    dim: 'var(--red-dim)',    label: 'Level 4', desc: 'extreme condition' }
];
const SVC_LABELS = { ext:'Exterior only', int:'Interior only', both:'Exterior + interior' };

// ── Pages ──
function switchPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  const icon = document.getElementById('settings-icon');
  if (p === 'settings') {
    renderSettingsPage();
    icon.innerHTML = `<svg viewBox="0 0 24 24" stroke="var(--accent)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`;
    icon.onclick = () => switchPage('estimate');
  } else {
    renderEstimator();
    icon.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
    icon.onclick = () => switchPage('settings');
  }
}

// ── Estimator ──
function renderEstimator() {
  // Size chips
  const sc = document.getElementById('size-chips');
  sc.innerHTML = '';
  S.sizeNames.forEach((name, i) => {
    const d = document.createElement('div');
    d.className = 'chip' + (sel.size === i ? ' active' : '');
    d.textContent = name;
    d.onclick = () => { sel.size = i; renderEstimator(); };
    sc.appendChild(d);
  });

  // Service chips
  document.querySelectorAll('#svc-chips .chip').forEach(c => {
    c.classList.toggle('active', c.dataset.val === sel.svc);
    c.onclick = () => { sel.svc = c.dataset.val; renderEstimator(); };
  });

  // Interior checks
  renderChecks('int-checks', S.intChecks, checkedInt);
  renderChecks('ext-checks', S.extChecks, checkedExt);

  renderResult();
}

function renderChecks(containerId, items, state) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  items.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'check' + (state[i] ? ' on' : '');
    d.innerHTML = `<span class="dot"></span>${item.label}`;
    d.onclick = () => { state[i] = !state[i]; d.classList.toggle('on', state[i]); d.querySelector('.dot').style.background = state[i] ? 'var(--red)' : ''; d.querySelector('.dot').style.borderColor = state[i] ? 'var(--red)' : ''; renderResult(); };
    c.appendChild(d);
  });
}

function getPts(state, items) {
  return Object.keys(state).reduce((s, i) => s + (state[i] ? items[i].pts : 0), 0);
}

function calcLevel(total) {
  if (total <= 2) return 0;
  if (total <= 5) return 1;
  if (total <= 9) return 2;
  return 3;
}

function renderResult() {
  const el = document.getElementById('result-wrap');
  if (sel.size === null || sel.svc === null) {
    el.innerHTML = '<div class="result-empty">Select a vehicle size and service type above</div>';
    return;
  }
  const ipts = getPts(checkedInt, S.intChecks);
  const epts = getPts(checkedExt, S.extChecks);
  const total = ipts + epts;
  const lvl = calcLevel(total);
  const price = S.prices[sel.svc][lvl][sel.size];
  const m = LEVEL_META[lvl];

  el.innerHTML = `
    <div class="result-card">
      <div class="result-top">
        <div class="level-pill" style="background:${m.dim};color:${m.color}">${m.label} — ${m.desc}</div>
        <div class="result-price" style="color:${m.color}">$${price}</div>
        <div class="result-meta">${S.sizeNames[sel.size]} · ${SVC_LABELS[sel.svc]}</div>
      </div>
      <div class="result-bottom">
        <div class="stat">
          <div class="stat-label">condition pts</div>
          <div class="stat-val" style="color:${m.color}">${total}</div>
        </div>
        <div class="stat">
          <div class="stat-label">pricing tier</div>
          <div class="stat-val" style="color:${m.color}">L${lvl+1} / 4</div>
        </div>
      </div>
    </div>`;
}

function resetAll() {
  sel = { size: null, svc: null };
  checkedInt = {}; checkedExt = {};
  renderEstimator();
}

// ── Settings ──
function renderSettingsPage() {
  // Size names
  const sng = document.getElementById('size-name-inputs');
  sng.innerHTML = '';
  S.sizeNames.forEach((name, i) => {
    sng.innerHTML += `<div class="size-name-wrap">
      <div class="size-name-lbl">Size ${i+1}</div>
      <input class="size-name-input" id="sname-${i}" value="${name}">
    </div>`;
  });

  // Price tables per level
  const ps = document.getElementById('price-settings');
  ps.innerHTML = '<div class="settings-title">Prices by level &amp; size</div>';
  const svcKeys = [{k:'ext',l:'Exterior only'},{k:'int',l:'Interior only'},{k:'both',l:'Both'}];
  for (let lvl = 0; lvl < 4; lvl++) {
    const m = LEVEL_META[lvl];
    ps.innerHTML += `<div class="settings-row" style="margin-bottom:8px">
      <div class="settings-row-label" style="color:${m.color}">${m.label}</div>
      ${svcKeys.map(sv => `
        <div style="margin-bottom:10px">
          <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px">${sv.l}</div>
          <div class="price-inputs">
            ${S.sizeNames.map((n,si) => `<div class="price-input-wrap">
              <div class="price-input-lbl">S${si+1}</div>
              <input class="price-input" id="p_${sv.k}_${lvl}_${si}" value="${S.prices[sv.k][lvl][si]}" type="number" inputmode="numeric">
            </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
  }

  // Check editors
  renderCheckEditor('int-editor', S.intChecks, 'int');
  renderCheckEditor('ext-editor', S.extChecks, 'ext');
}

function renderCheckEditor(containerId, items, type) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'check-edit-row';
    row.innerHTML = `
      <input class="check-edit-input" id="chk_${type}_${i}_lbl" value="${item.label}" placeholder="Item name">
      <select class="pts-select" id="chk_${type}_${i}_pts">
        ${[1,2,3].map(p=>`<option value="${p}"${item.pts==p?' selected':''}>${p}pt</option>`).join('')}
      </select>
      <button class="del-btn" onclick="delCheck('${type}',${i})">×</button>`;
    c.appendChild(row);
  });
}

function addCheck(type) {
  const arr = type === 'int' ? S.intChecks : S.extChecks;
  arr.push({ label: '', pts: 1 });
  renderCheckEditor(type === 'int' ? 'int-editor' : 'ext-editor', arr, type);
}

function delCheck(type, i) {
  const arr = type === 'int' ? S.intChecks : S.extChecks;
  arr.splice(i, 1);
  renderCheckEditor(type === 'int' ? 'int-editor' : 'ext-editor', arr, type);
}

function saveSettings() {
  // Size names
  S.sizeNames = S.sizeNames.map((_, i) => document.getElementById(`sname-${i}`).value.trim() || `Size ${i+1}`);

  // Prices
  ['ext','int','both'].forEach(sv => {
    for (let lvl = 0; lvl < 4; lvl++) {
      S.sizeNames.forEach((_, si) => {
        const el = document.getElementById(`p_${sv}_${lvl}_${si}`);
        if (el) S.prices[sv][lvl][si] = parseInt(el.value) || 0;
      });
    }
  });

  // Checks
  ['int','ext'].forEach(type => {
    const arr = type === 'int' ? S.intChecks : S.extChecks;
    arr.forEach((item, i) => {
      const lbl = document.getElementById(`chk_${type}_${i}_lbl`);
      const pts = document.getElementById(`chk_${type}_${i}_pts`);
      if (lbl) item.label = lbl.value.trim();
      if (pts) item.pts = parseInt(pts.value);
    });
  });

  localStorage.setItem('dp_state', JSON.stringify(S));
  checkedInt = {}; checkedExt = {};

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Init ──
renderEstimator();
</script>
